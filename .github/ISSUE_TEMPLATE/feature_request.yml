name: 💡 Feature Request
description: Suggest an improvement or new capability
title: "[FEATURE] "
labels: ["enhancement"]
assignees:
  - soubarna

body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make the scraper better? Describe it below.
        Feature requests are reviewed and prioritised by the author.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or gap you're running into
      placeholder: |
        Currently I can't filter results by category before exporting.
        I have to manually delete rows in Excel which is time-consuming.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: |
        Add a "Category filter" dropdown in the settings panel so I can
        restrict scraping to only e.g. "Restaurant" or "IT Company".
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking — I cannot use the app effectively without it
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Mockups, examples, links, screenshots, etc.
